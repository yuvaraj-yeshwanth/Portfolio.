<!DOCTYPE html>
<html>
<head>
    <title>YUVARAJ M - Portfolio</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            white-space: pre-wrap;
            overflow: hidden;
            font-size: 18px;
        }
        
        .content {
            max-width: 900px;
            width: 100%;
            margin-top: 0;
            line-height: 1.3;
        }
        
        .green { color: #00ff00; }
        .red { color: #ff0000; }
        .blue { color: #00aaff; }
        .cursor { animation: blink 1s infinite; }
        
        a.blue {
            text-decoration: none;
            border-bottom: 1px solid #00aaff;
            color: #00aaff !important;
            cursor: pointer;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="content"></div>

    <script>
        const content = [
            {text: "root@yuvxraj_Hub:~# ", color: "green"},
            {text: "whoami", color: "white", delayAfter: 100},
            {text: "\nYuvaraj M | ", color: "white"},
            {text: "GRC Analyst", color: "blue"},
            {text: " | Risk, Compliance, InfoSec | Chennai, India\n", color: "white", delayAfter: 50},
            
            {text: "\nroot@yuvxraj_Hub:~# ", color: "green"},
            {text: "cat profile.txt", color: "white", delayAfter: 100},
            {text: "\nGRC Analyst specialising in risk management, compliance, and cloud controls.\nFocused on ", color: "white"},
            {text: "SOC 2, ISO 27001, GDPR/DPDP, PCI DSS, HIPAA, and NIST CSF.", color: "blue", delayAfter: 50},
            {text: "\nMy foundation in offensive security means I assess how systems actually fail, ensuring controls are practical.\n", color: "white", delayAfter: 50},
            
            {text: "\nroot@yuvxraj_Hub:~# ", color: "green"},
            {text: "cat projects.txt", color: "white", delayAfter: 100},
            {text: "\nKey Projects & Capabilities:\n", color: "white"},
            {text: "- ISMS & Cloud Security: ", color: "white"}, {text: "Built risk registers, SoAs, and mapped controls for ISO 27001 & SOC 2.\n", color: "blue"},
            {text: "- Data Privacy & NIST: ", color: "white"}, {text: "Developed DPIAs and RoPAs for GDPR/DPDP; aligned frameworks to NIST CSF & HIPAA.\n", color: "blue"},
            {text: "- Vendor Risk & PCI DSS: ", color: "white"}, {text: "Scoped cardholder environments and created vendor due-diligence models.\n", color: "blue"},
            {text: "- AI Governance: ", color: "white"}, {text: "Drafted ISO 42001 risk assessments and responsible-use control documentation.\n", color: "blue"},
            {text: "- SecOps & Offensive: ", color: "white"}, {text: "SOC L1/L2 monitoring, digital forensics, and web app vulnerability assessments.\n", color: "blue", delayAfter: 50},
            
            {text: "\nroot@yuvxraj_Hub:~# ", color: "green"},
            {text: "cat certs.txt", color: "white", delayAfter: 100},
            {text: "\nGRC & Risk:\n", color: "white"},
            {text: "- CGRCP, ISO 27701 & 42001 Lead Auditor, CHRMP, CISA (Prep)\n", color: "blue"},
            {text: "Security & Operations:\n", color: "white"},
            {text: "- CLLMSP, CORA, CyberSec First Responder (CFR-410), THM SOC L1/L2\n", color: "blue", delayAfter: 50},
            
            {text: "\nroot@yuvxraj_Hub:~# ", color: "green"},
            {text: "cat contact.txt", color: "white", delayAfter: 100},
            {text: "\nTwitter - ", color: "white"},
            {link: "https://twitter.com/yuve_Tweets", text: "@yuve_Tweets", color: "blue"},
            {text: "\nEmail   - ", color: "white"},
            {link: "mailto:yuvarajyeshwanth7574@gmail.com", text: "yuvarajyeshwanth7574@gmail.com", color: "blue", delayAfter: 50},
            
            {text: "\n\nWhere Compliance Meets Capability.\n", color: "red"},
            
            {text: "\nroot@yuvxraj_Hub:~# ", color: "green"},
            {text: "exit", color: "white", delayAfter: 100}
        ];

        const contentDiv = document.querySelector('.content');
        let index = 0;
        const typingSpeed = 15; 
        
        function typeWriter() {
            if(index >= content.length) {
                contentDiv.innerHTML += '<span class="cursor">_</span>';
                return;
            }
            
            const segment = content[index];
            
            if(segment.link) {
                const link = document.createElement('a');
                link.href = segment.link;
                link.target = "_blank";
                link.className = "blue";
                
                let charIndex = 0;
                function addLinkChar() {
                    if(charIndex < segment.text.length) {
                        link.textContent += segment.text[charIndex];
                        contentDiv.appendChild(link);
                        charIndex++;
                        setTimeout(addLinkChar, typingSpeed);
                    } else {
                        index++;
                        setTimeout(typeWriter, 50);
                    }
                }
                addLinkChar();
            } else {
                const element = document.createElement('span');
                if(segment.color) element.className = segment.color;
                
                let charIndex = 0;
                function addChar() {
                    if(charIndex < segment.text.length) {
                        element.textContent += segment.text[charIndex];
                        contentDiv.appendChild(element);
                        charIndex++;
                        setTimeout(addChar, typingSpeed);
                    } else {
                        index++;
                        setTimeout(typeWriter, segment.delayAfter || 30);
                    }
                }
                addChar();
            }
        }

        typeWriter();
    </script>
</body>
</html>
